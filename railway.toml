[build]
builder = "dockerfile"

[deploy]
startCommand = "uvicorn web.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 300

[service.web]
start = "uvicorn web.main:app --host 0.0.0.0 --port $PORT"

[env]
PYTHON_VERSION = "3.11"
PORT = "8080"
DISABLE_POLLING = "1"
# DATABASE_URL = "sqlite:///app.db"
# REDIS_URL = ""
