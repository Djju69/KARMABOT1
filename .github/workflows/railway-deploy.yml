name: Railway Deploy

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      has-secrets: ${{ steps.check-secrets.outputs.has-secrets }}
    steps:
      - name: Check for required secrets
        id: check-secrets
        run: |
          if [ -z "${{ secrets.RAILWAY_TOKEN }}" ]; then
            echo "::error::❌ RAILWAY_TOKEN is not set in repository secrets"
            echo "has-secrets=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          if [ -z "${{ secrets.RAILWAY_PROJECT }}" ]; then
            echo "::warning::⚠️ RAILWAY_PROJECT is not set in repository secrets"
          fi
          echo "has-secrets=true" >> $GITHUB_OUTPUT
          echo "✅ All required secrets are present"

  deploy:
    needs: check-secrets
    if: needs.check-secrets.outputs.has-secrets == 'true'
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT: ${{ secrets.RAILWAY_PROJECT }}
      RAILWAY_ENVIRONMENT: ${{ secrets.RAILWAY_ENVIRONMENT || 'main' }}
      REDIS_URL: ${{ secrets.REDIS_URL || '' }}
      ENABLE_POLLING_LEADER_LOCK: ${{ secrets.ENABLE_POLLING_LEADER_LOCK || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Show Railway CLI version
        run: railway --version

      - name: Two-step deploy to Railway (CI)
        run: |
          set -euo pipefail
          echo "🚀 Начинаем двухэтапный деплой на Railway..."
          
          # Настройка префикса для команд Railway
          RAILWAY_CMD="railway"
          if [ -n "$RAILWAY_PROJECT" ]; then
            RAILWAY_CMD="$RAILWAY_CMD --project \"$RAILWAY_PROJECT\""
          fi
          if [ -n "$RAILWAY_ENVIRONMENT" ]; then
            RAILWAY_CMD="$RAILWAY_CMD --environment \"$RAILWAY_ENVIRONMENT\""
          fi
          
          # Шаг 1: Первоначальный деплой с выключенным поллингом
          echo "🔧 Шаг 1/2: Первоначальный деплой (DISABLE_POLLING=1)"
          bash -c "$RAILWAY_CMD variables set DISABLE_POLLING=1 FEATURE_PARTNER_FSM=true --yes"
          
          # Устанавливаем REDIS_URL, если он указан
          if [ -n "$REDIS_URL" ]; then
            bash -c "$RAILWAY_CMD variables set REDIS_URL=\"$REDIS_URL\" --yes"
          fi
          
          # Запускаем первый деплой
          bash -c "$RAILWAY_CMD up --detach" || echo "⚠️ Первый этап деплоя завершился с предупреждениями"
          
          # Шаг 2: Финальный деплой с включенным поллингом
          echo "🚀 Шаг 2/2: Финальный деплой (DISABLE_POLLING=0)"
          bash -c "$RAILWAY_CMD variables set DISABLE_POLLING=0 --yes"
          
          # Устанавливаем ENABLE_POLLING_LEADER_LOCK, если указан
          if [ -n "$ENABLE_POLLING_LEADER_LOCK" ]; then
            bash -c "$RAILWAY_CMD variables set ENABLE_POLLING_LEADER_LOCK=\"$ENABLE_POLLING_LEADER_LOCK\" --yes"
          fi
          
          # Запускаем финальный деплой
          bash -c "$RAILWAY_CMD up --detach"
          
          echo "✅ Двухэтапный деплой успешно завершен!"

      - name: Post logs hint
        run: |
          echo "If deploy did not target the right project, set repository secrets:"
          echo "  RAILWAY_TOKEN, RAILWAY_PROJECT, RAILWAY_ENVIRONMENT"
          echo "Optional: REDIS_URL, ENABLE_POLLING_LEADER_LOCK"
