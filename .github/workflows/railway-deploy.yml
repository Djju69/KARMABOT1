name: Railway Deploy

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      has-secrets: ${{ steps.check-secrets.outputs.has-secrets }}
    steps:
      - name: Check for required secrets
        id: check-secrets
        run: |
          if [ -z "${{ secrets.RAILWAY_TOKEN }}" ]; then
            echo "::error::❌ RAILWAY_TOKEN is not set in repository secrets"
            echo "has-secrets=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          if [ -z "${{ secrets.RAILWAY_PROJECT }}" ]; then
            echo "::warning::⚠️ RAILWAY_PROJECT is not set in repository secrets"
          fi
          echo "has-secrets=true" >> $GITHUB_OUTPUT
          echo "✅ All required secrets are present"

  deploy:
    needs: check-secrets
    if: needs.check-secrets.outputs.has-secrets == 'true'
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT: ${{ secrets.RAILWAY_PROJECT }}
      RAILWAY_ENVIRONMENT: ${{ secrets.RAILWAY_ENVIRONMENT || 'main' }}
      REDIS_URL: ${{ secrets.REDIS_URL || '' }}
      ENABLE_POLLING_LEADER_LOCK: ${{ secrets.ENABLE_POLLING_LEADER_LOCK || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Show Railway CLI version
        run: railway --version

      - name: Deploy to Railway
        run: |
          set -euo pipefail
          echo "🚀 Starting Railway deployment..."
          
          # Install Railway CLI with specific version
          npm install -g @railway/cli@2.0.5
          
          # Login to Railway
          echo "🔑 Logging in to Railway..."
          echo "$RAILWAY_TOKEN" | railway login --ci
          
          # Set project if specified
          if [ -n "$RAILWAY_PROJECT" ]; then
            echo "🔗 Setting project to $RAILWAY_PROJECT..."
            railway link $RAILWAY_PROJECT
          fi
          
          # Set environment if specified
          if [ -n "$RAILWAY_ENVIRONMENT" ]; then
            echo "🌍 Setting environment to $RAILWAY_ENVIRONMENT..."
            railway environment switch $RAILWAY_ENVIRONMENT
          fi
          
          # Set environment variables
          echo "⚙️  Setting environment variables..."
          railway variables set NODE_ENV=production --yes
          railway variables set DISABLE_POLLING=1 --yes
          
          if [ -n "$REDIS_URL" ]; then
            railway variables set REDIS_URL="$REDIS_URL" --yes
          fi
          
          if [ -n "$ENABLE_POLLING_LEADER_LOCK" ]; then
            railway variables set ENABLE_POLLING_LEADER_LOCK="$ENABLE_POLLING_LEADER_LOCK" --yes
          fi
          
          # Run deployment
          echo "🚀 Starting deployment..."
          railway up --detach || echo "⚠️ Deployment completed with warnings"
          
          # Final environment setup
          echo "🔧 Final environment setup..."
          railway variables set DISABLE_POLLING=0 --yes
          
          echo "✅ Deployment completed successfully!"
          
          # Show service URL
          echo "🌐 Service URL: $(railway status --json | jq -r '.service.privateDomain')"

      - name: Post logs hint
        run: |
          echo "If deploy did not target the right project, set repository secrets:"
          echo "  RAILWAY_TOKEN, RAILWAY_PROJECT, RAILWAY_ENVIRONMENT"
          echo "Optional: REDIS_URL, ENABLE_POLLING_LEADER_LOCK"
