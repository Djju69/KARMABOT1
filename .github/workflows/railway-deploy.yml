name: Railway Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Make deploy script executable
        run: chmod +x ./deploy.sh

      - name: Run deployment
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT: ${{ secrets.RAILWAY_PROJECT }}
          RAILWAY_ENVIRONMENT: ${{ secrets.RAILWAY_ENVIRONMENT || 'main' }}
          REDIS_URL: ${{ secrets.REDIS_URL || '' }}
          ENABLE_POLLING_LEADER_LOCK: ${{ secrets.ENABLE_POLLING_LEADER_LOCK || '' }}
        run: ./deploy.sh

      - name: Show service URL
        if: always()
        run: |
          echo "If deploy failed, check:"
          echo "1. RAILWAY_TOKEN is valid"
          echo "2. RAILWAY_PROJECT is correct"
          echo "3. Check Railway dashboard for errors"
