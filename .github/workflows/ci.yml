name: CI & Deploy

on:
  push:
    branches: [ main, fix/deploy-web ]
  pull_request:
  workflow_dispatch: {}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Тесты запускаем ТОЛЬКО если в Repo Variables выставишь RUN_TESTS=1
  test:
    if: ${{ vars.RUN_TESTS == '1' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-test.txt ]; then pip install -r requirements-test.txt; fi
          if [ -f pytest.ini ] || [ -d tests ]; then pip install pytest; fi
      - name: Run tests
        run: pytest -q

  deploy:
    # Разрешаем деплой при ручном запуске ИЛИ пуше в main ИЛИ пуше в fix/deploy-web
    if: ${{ github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/fix/deploy-web' }}
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
      RAILWAY_SERVICE_BOT: ${{ secrets.RAILWAY_SERVICE_BOT }}
      RAILWAY_SERVICE_WEB: ${{ secrets.RAILWAY_SERVICE_WEB }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Railway CLI
        run: npm i -g @railway/cli
      - name: Login & link project
        run: |
          if [ -z "$RAILWAY_TOKEN" ] || [ -z "$RAILWAY_PROJECT_ID" ]; then
            echo "Railway secrets not set; skipping deploy."
            exit 0
          fi
          railway login --token "$RAILWAY_TOKEN"
          railway link --project "$RAILWAY_PROJECT_ID"
      - name: Deploy web service
        if: ${{ env.RAILWAY_SERVICE_WEB != '' }}
        run: railway up --ci --service "$RAILWAY_SERVICE_WEB"
      - name: Deploy bot service (optional)
        if: ${{ env.RAILWAY_SERVICE_BOT != '' }}
        run: railway up --ci --service "$RAILWAY_SERVICE_BOT"
      - name: Deploy default service (fallback)
        if: ${{ env.RAILWAY_SERVICE_WEB == '' && env.RAILWAY_SERVICE_BOT == '' }}
        run: railway up --ci
