name: CI & Deploy

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch: {}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:///app.db
      DISABLE_POLLING: "1"
      PORT: "8080"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # основное (если есть)
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # ДОставляем только для тестов (если каталог tests существует)
          if [ -d tests ]; then
            pip install \
              pytest pytest-asyncio \
              aiohttp httpx \
              environs python-dotenv marshmallow \
              redis aiosqlite asyncpg \
              PyJWT pyotp email-validator \
              pillow qrcode python-multipart \
              prometheus-client jsonschema
          fi

      - name: Run tests
        run: |
          if [ -d tests ]; then pytest -q; else echo "No tests"; fi

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
      RAILWAY_SERVICE_BOT: ${{ secrets.RAILWAY_SERVICE_BOT }}
      RAILWAY_SERVICE_WEB: ${{ secrets.RAILWAY_SERVICE_WEB }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Railway CLI
        run: npm i -g @railway/cli
      - name: Login & link project
        run: |
          if [ -z "$RAILWAY_TOKEN" ] || [ -z "$RAILWAY_PROJECT_ID" ]; then
            echo "Railway secrets not set; skipping deploy."
            exit 0
          fi
          railway login --token "$RAILWAY_TOKEN"
          railway link --project "$RAILWAY_PROJECT_ID"
      - name: Deploy bot service
        if: ${{ env.RAILWAY_SERVICE_BOT != '' }}
        run: railway up --ci --service "$RAILWAY_SERVICE_BOT"
      - name: Deploy web service
        if: ${{ env.RAILWAY_SERVICE_WEB != '' }}
        run: railway up --ci --service "$RAILWAY_SERVICE_WEB"
      - name: Deploy default service (fallback)
        if: ${{ env.RAILWAY_SERVICE_BOT == '' && env.RAILWAY_SERVICE_WEB == '' }}
        run: railway up --ci
