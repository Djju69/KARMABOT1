name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install Railway CLI
        run: |
          npm install -g @railway/cli
          railway --version
        
      - name: Login to Railway
        run: |
          echo "Logging in to Railway..."
          echo ${{ secrets.RAILWAY_TOKEN }} | railway login --ci || {
            echo "Failed to log in to Railway"
            exit 1
          }
          
      - name: Link to Railway project
        run: |
          echo "Linking to project: ${{ secrets.RAILWAY_PROJECT_ID }}"
          railway link ${{ secrets.RAILWAY_PROJECT_ID }} || {
            echo "Failed to link to Railway project"
            exit 1
          }
          
      - name: Show environment info
        run: |
          echo "Current directory: $(pwd)"
          echo "Files in directory:"
          ls -la
          echo ""
          echo "Dockerfile exists: $(test -f Dockerfile && echo 'Yes' || echo 'No')"
          echo "start.sh exists: $(test -f start.sh && echo 'Yes' || echo 'No')"
          echo ""
          echo "Railway status:"
          railway status || true
          
      - name: Set environment variables
        run: |
          echo "Setting environment variables..."
          railway variables set NODE_ENV=production --json
          railway variables set ENABLE_POLLING_LEADER_LOCK=true --json
          railway variables set RAILWAY_ENVIRONMENT=production --json
          railway variables set REDIS_URL=${{ secrets.REDIS_URL }} --json
          
      - name: Deploy to Railway
        run: |
          echo "Starting deployment..."
          railway up -y --debug
          
      - name: Verify deployment
        run: |
          echo "Verifying deployment..."
          railway status
          railway logs --tail 10 || true
          
      - name: Show Railway variables
        run: |
          echo "Current Railway variables:"
          railway variables list || true
